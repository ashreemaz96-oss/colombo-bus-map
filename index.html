<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Colombo Bus Watch</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css"/>

  <style>
    :root {
      --red:    #e94560;
      --navy:   #0f172a;
      --panel:  #16213e;
      --border: #1e3a5f;
      --muted:  #64748b;
      --text:   #f1f5f9;
      --sub:    #94a3b8;
      --yellow: #f59e0b;
      --cyan:   #06b6d4;
      --teal:   #4ecdc4;
      --purple: #a855f7;
      --green:  #22c55e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--navy); color: var(--text); overflow: hidden; }

    /* ── Header ── */
    #header {
      background: var(--panel);
      padding: 0 16px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid var(--red);
      position: relative;
      z-index: 1001;
    }
    #header .brand { display: flex; align-items: center; gap: 10px; }
    #header .brand .icon { font-size: 1.4rem; }
    #header .brand h1 { font-size: 1rem; font-weight: 700; color: var(--text); }
    #header .brand p  { font-size: 0.7rem; color: var(--sub); margin-top: 1px; }
    #header .actions  { display: flex; align-items: center; gap: 8px; }

    .hdr-btn {
      padding: 7px 14px;
      border-radius: 7px;
      border: none;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 700;
      white-space: nowrap;
    }
    #locate-hdr-btn { background: rgba(6,182,212,0.15); color: var(--cyan); border: 1px solid rgba(6,182,212,0.3); }
    #locate-hdr-btn:hover { background: rgba(6,182,212,0.25); }
    #report-btn { background: var(--red); color: #fff; }
    #report-btn:hover { background: #c73652; }

    /* ── Map ── */
    #map { height: calc(100vh - 54px); width: 100%; }

    /* ── Pulsing user location dot ── */
    .user-location-marker {
      position: relative;
      width: 18px; height: 18px;
    }
    .user-location-marker .dot {
      width: 14px; height: 14px;
      background: #2563eb;
      border: 2.5px solid #fff;
      border-radius: 50%;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
    }
    .user-location-marker .pulse {
      width: 36px; height: 36px;
      background: rgba(37,99,235,0.25);
      border-radius: 50%;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 2s ease-out infinite;
      z-index: 1;
    }
    @keyframes pulse {
      0%   { transform: translate(-50%,-50%) scale(0.5); opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(1.8); opacity: 0; }
    }

    /* ── Stats panel (bottom) ── */
    #stats-panel {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .stat-card {
      background: rgba(15,23,42,0.92);
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 10px 14px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 72px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      user-select: none;
    }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-card.active { transform: translateY(-4px); box-shadow: 0 6px 24px rgba(0,0,0,0.4); }

    .stat-card[data-type="all"]          { border-color: rgba(233,69,96,0.4); }
    .stat-card[data-type="Overcrowding"] { border-color: rgba(233,69,96,0.3); }
    .stat-card[data-type="Delay"]        { border-color: rgba(245,158,11,0.3); }
    .stat-card[data-type="Misconduct"]   { border-color: rgba(168,85,247,0.3); }
    .stat-card[data-type="Lost Item"]    { border-color: rgba(78,205,196,0.3); }

    .stat-card.active[data-type="all"]          { border-color: var(--red);    background: rgba(233,69,96,0.15); }
    .stat-card.active[data-type="Overcrowding"] { border-color: var(--red);    background: rgba(233,69,96,0.15); }
    .stat-card.active[data-type="Delay"]        { border-color: var(--yellow); background: rgba(245,158,11,0.15); }
    .stat-card.active[data-type="Misconduct"]   { border-color: var(--purple); background: rgba(168,85,247,0.15); }
    .stat-card.active[data-type="Lost Item"]    { border-color: var(--teal);   background: rgba(78,205,196,0.15); }

    .stat-card .s-icon { font-size: 1.2rem; display: block; margin-bottom: 2px; }
    .stat-card .s-num  { font-size: 1.4rem; font-weight: 800; line-height: 1; }
    .stat-card .s-lbl  { font-size: 0.65rem; color: var(--sub); margin-top: 2px; line-height: 1.2; }

    .stat-card[data-type="all"] .s-num          { color: var(--red); }
    .stat-card[data-type="Overcrowding"] .s-num { color: var(--red); }
    .stat-card[data-type="Delay"] .s-num        { color: var(--yellow); }
    .stat-card[data-type="Misconduct"] .s-num   { color: var(--purple); }
    .stat-card[data-type="Lost Item"] .s-num    { color: var(--teal); }

    /* active filter banner */
    #filter-banner {
      position: absolute;
      top: 64px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(15,23,42,0.92);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.78rem;
      color: var(--text);
      display: none;
      align-items: center;
      gap: 10px;
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      white-space: nowrap;
    }
    #filter-banner.visible { display: flex; }
    #filter-banner .clear-btn {
      background: none;
      border: none;
      color: var(--sub);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0 2px;
    }
    #filter-banner .clear-btn:hover { color: var(--red); }

    /* ── Refresh indicator ── */
    #refresh-pill {
      position: absolute;
      top: 64px;
      right: 12px;
      z-index: 1000;
      background: rgba(15,23,42,0.88);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 10px;
      font-size: 0.72rem;
      color: var(--sub);
      display: flex;
      align-items: center;
      gap: 6px;
      backdrop-filter: blur(6px);
    }
    #refresh-pill .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }
    #refresh-pill .dot.loading { background: var(--yellow); animation: blink 0.7s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    #refresh-pill .countdown { font-variant-numeric: tabular-nums; min-width: 22px; text-align: right; }

    /* ── Legend (bottom-right) ── */
    .legend {
      background: rgba(15,23,42,0.92);
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.78rem;
      line-height: 1.9;
      backdrop-filter: blur(8px);
    }
    .legend h4 { margin-bottom: 6px; color: var(--red); font-size: 0.82rem; letter-spacing: 0.04em; text-transform: uppercase; }
    .legend-row { display: flex; align-items: center; gap: 7px; }
    .legend-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .legend-dot.stop { background: var(--cyan); }
    .legend-dot.user { background: #2563eb; border: 2px solid #fff; }

    /* ── Filter panel (top-right) ── */
    .filter-panel {
      background: rgba(15,23,42,0.92);
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 0.78rem;
      color: var(--text);
      backdrop-filter: blur(8px);
    }
    .filter-panel h4 { margin-bottom: 8px; color: var(--red); font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .filter-panel label { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; cursor: pointer; }
    .filter-panel input[type=checkbox] { accent-color: var(--red); width: 13px; height: 13px; }
    .filter-panel .sep { border: none; border-top: 1px solid var(--border); margin: 7px 0; }

    /* ── Leaflet popup styling ── */
    .leaflet-popup-content-wrapper {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--red);
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .leaflet-popup-tip { background: var(--panel); }
    .leaflet-popup-content { margin: 12px 16px; }
    .popup-type { font-weight: 700; font-size: 0.95rem; margin-bottom: 6px; }
    .popup-row  { margin: 3px 0; font-size: 0.82rem; }
    .popup-row .lbl { color: var(--sub); }

    /* ── Loading overlay ── */
    #loading-overlay {
      position: absolute;
      inset: 54px 0 0 0;
      background: rgba(15,23,42,0.7);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      transition: opacity 0.4s;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(233,69,96,0.2);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-overlay p { font-size: 0.85rem; color: var(--sub); }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 100px; left: 50%;
      transform: translateX(-50%) translateY(40px);
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 0.82rem;
      opacity: 0;
      transition: all 0.3s;
      z-index: 3000;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Mobile tweaks ── */
    @media (max-width: 480px) {
      #header .brand h1 { font-size: 0.88rem; }
      #header .brand p  { display: none; }
      .stat-card { min-width: 60px; padding: 8px 10px; }
      .stat-card .s-num { font-size: 1.2rem; }
      #stats-panel { gap: 5px; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<div id="header">
  <div class="brand">
    <div class="icon">🚌</div>
    <div>
      <h1>Colombo Bus Watch</h1>
      <p>CMC Area · Crowdsourced Transport Reports</p>
    </div>
  </div>
  <div class="actions">
    <button class="hdr-btn" id="locate-hdr-btn" onclick="locateMe()">📍 My Location</button>
    <button class="hdr-btn" id="report-btn" onclick="openReportForm()">+ Report</button>
  </div>
</div>

<!-- ── Map ── -->
<div id="map"></div>

<!-- ── Loading overlay ── -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <p>Loading reports…</p>
</div>

<!-- ── Active filter banner ── -->
<div id="filter-banner">
  <span id="filter-banner-text">Showing: All</span>
  <button class="clear-btn" onclick="clearFilter()" title="Show all">✕</button>
</div>

<!-- ── Refresh pill ── -->
<div id="refresh-pill">
  <div class="dot" id="refresh-dot"></div>
  <span id="refresh-label">Live</span>
  <span class="countdown" id="refresh-countdown">60s</span>
</div>

<!-- ── Stats panel ── -->
<div id="stats-panel">
  <div class="stat-card active" data-type="all" onclick="filterByType('all')">
    <span class="s-icon">🗂️</span>
    <div class="s-num" id="stat-total">0</div>
    <div class="s-lbl">All<br>Reports</div>
  </div>
  <div class="stat-card" data-type="Overcrowding" onclick="filterByType('Overcrowding')">
    <span class="s-icon">🚌</span>
    <div class="s-num" id="stat-crowd">0</div>
    <div class="s-lbl">Over-<br>crowding</div>
  </div>
  <div class="stat-card" data-type="Delay" onclick="filterByType('Delay')">
    <span class="s-icon">⏱️</span>
    <div class="s-num" id="stat-delay">0</div>
    <div class="s-lbl">Delays</div>
  </div>
  <div class="stat-card" data-type="Misconduct" onclick="filterByType('Misconduct')">
    <span class="s-icon">⚠️</span>
    <div class="s-num" id="stat-misc">0</div>
    <div class="s-lbl">Mis-<br>conduct</div>
  </div>
  <div class="stat-card" data-type="Lost Item" onclick="filterByType('Lost Item')">
    <span class="s-icon">🎒</span>
    <div class="s-num" id="stat-lost">0</div>
    <div class="s-lbl">Lost<br>Items</div>
  </div>
</div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
// ╔══════════════════════════════════════════════╗
// ║  CONFIG — update these two values            ║
// ╚══════════════════════════════════════════════╝
const SHEET_CSV_URL  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRasFFahZ99QPZhYfeAgFIEw5mf5yievDY4JCd55WArORfjk_5NVFKjo50qoyI36PF1e4iUT7kKS0Hr/pub?output=csv';
const GOOGLE_FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSeGCGK3xjOS-F8s1BXwow29UaXNWmXQ3mWYUddt2apAiLO6ug/viewform?usp=preview';  // your GPS report wrapper page

// Column headers in your Google Sheet — must match exactly
const COL = {
  type:      'Report Type',
  route:     'Bus Route Number',
  stop:      'Bus Stop / Location Name',
  crowding:  'Crowding Level',
  delay:     'Delay Duration (minutes)',
  desc:      'Issue Description',
  time:      'Time of Incident',
  timestamp: 'Timestamp',
  lat:       'Latitude',   // added by report.html GPS capture
  lng:       'Longitude',  // added by report.html GPS capture
};

// Colours per report type
const COLORS = {
  'Overcrowding': '#e94560',
  'Delay':        '#f59e0b',
  'Lost Item':    '#4ecdc4',
  'Misconduct':   '#a855f7',
};
const TYPE_ICONS = {
  'Overcrowding': '🚌',
  'Delay':        '⏱️',
  'Lost Item':    '🎒',
  'Misconduct':   '⚠️',
};

// ── Map init ─────────────────────────────────
const map = L.map('map', { zoomControl: false }).setView([6.9271, 79.8612], 13);
L.control.zoom({ position: 'topleft' }).addTo(map);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
  maxZoom: 19
}).addTo(map);

// ── GeoJSON layers ────────────────────────────
fetch('data/cmc_boundary.geojson').then(r => r.json()).then(data => {
  L.geoJSON(data, {
    style: { color: '#e94560', weight: 2, fillOpacity: 0.04, fillColor: '#e94560', dashArray: '6 4' }
  }).addTo(map);
}).catch(() => {});

fetch('data/road_network.geojson').then(r => r.json()).then(data => {
  L.geoJSON(data, {
    style: { color: '#1e3a5f', weight: 1.2, opacity: 0.8 }
  }).addTo(map);
}).catch(() => {});

let busStopsLayer = null;
fetch('data/bus_stops.geojson').then(r => r.json()).then(data => {
  const busStopIcon = L.divIcon({
    className: '',
    html: `<div style="width:9px;height:9px;background:#06b6d4;border-radius:50%;border:2px solid #fff;box-shadow:0 0 4px rgba(6,182,212,0.6)"></div>`,
    iconSize: [9,9], iconAnchor: [4.5,4.5]
  });
  busStopsLayer = L.geoJSON(data, {
    pointToLayer: (f, ll) => L.marker(ll, { icon: busStopIcon }),
    onEachFeature: (f, layer) => {
      const n = f.properties.name || f.properties.Name || 'Bus Stop';
      layer.bindPopup(`<b style="color:#06b6d4">🚏 ${n}</b>`);
    }
  }).addTo(map);
}).catch(() => {});

// ── User location ─────────────────────────────
let userMarker = null;
let locateWatcher = null;

function locateMe() {
  const btn = document.getElementById('locate-hdr-btn');
  if (!navigator.geolocation) { showToast('❌ Geolocation not supported'); return; }

  btn.textContent = '⏳ Locating…';
  btn.disabled = true;

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      // Remove old marker
      if (userMarker) map.removeLayer(userMarker);

      const icon = L.divIcon({
        className: '',
        html: `<div class="user-location-marker"><div class="pulse"></div><div class="dot"></div></div>`,
        iconSize: [18,18],
        iconAnchor: [9,9]
      });

      userMarker = L.marker([lat, lng], { icon, zIndexOffset: 1000 })
        .bindPopup(`<b style="color:#2563eb">📍 You are here</b><br><small style="color:#94a3b8">±${Math.round(pos.coords.accuracy)} m accuracy</small>`)
        .addTo(map);

      map.flyTo([lat, lng], 15, { duration: 1.4 });
      userMarker.openPopup();

      btn.textContent = '📍 My Location';
      btn.disabled = false;
      showToast('📍 Location found');
    },
    (err) => {
      const msgs = {
        1: '❌ Location permission denied',
        2: '❌ Position unavailable',
        3: '❌ Location request timed out',
      };
      showToast(msgs[err.code] || '❌ Location error');
      btn.textContent = '📍 My Location';
      btn.disabled = false;
    },
    { enableHighAccuracy: true, timeout: 12000, maximumAge: 30000 }
  );
}

// ── Report markers ────────────────────────────
const reportLayers = {
  'Overcrowding': L.markerClusterGroup({ chunkedLoading: true }),
  'Delay':        L.markerClusterGroup({ chunkedLoading: true }),
  'Lost Item':    L.markerClusterGroup({ chunkedLoading: true }),
  'Misconduct':   L.markerClusterGroup({ chunkedLoading: true }),
};
Object.values(reportLayers).forEach(l => l.addTo(map));

let activeFilter = 'all';  // currently active stat card filter

// ── Geocode cache (avoids repeated Nominatim calls) ──
const geocodeCache = {};
async function geocodeStop(name) {
  if (geocodeCache[name]) return geocodeCache[name];
  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(name + ', Colombo, Sri Lanka')}&format=json&limit=1`;
    const res  = await fetch(url);
    const data = await res.json();
    if (data.length) {
      const ll = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
      geocodeCache[name] = ll;
      return ll;
    }
  } catch(e) {}
  return null;
}

// ── Load + render reports ─────────────────────
let counts = { total: 0, Overcrowding: 0, Delay: 0, Misconduct: 0, 'Lost Item': 0 };

async function loadReports() {
  setRefreshState('loading');

  Papa.parse(SHEET_CSV_URL, {
    download: true,
    header: true,
    complete: async (results) => {
      const rows = results.data.filter(r => r[COL.type] && r[COL.type].trim());

      // Reset
      Object.values(reportLayers).forEach(l => l.clearLayers());
      counts = { total: 0, Overcrowding: 0, Delay: 0, Misconduct: 0, 'Lost Item': 0 };

      for (const row of rows) {
        const type = row[COL.type].trim();
        if (!COLORS[type]) continue;

        counts.total++;
        counts[type] = (counts[type] || 0) + 1;

        // Prefer GPS coords; fallback to geocoding the stop name
        let latlng = null;
        const rawLat = parseFloat(row[COL.lat]);
        const rawLng = parseFloat(row[COL.lng]);

        if (!isNaN(rawLat) && !isNaN(rawLng) && rawLat !== 0 && rawLng !== 0) {
          latlng = [rawLat, rawLng];
        } else if (row[COL.stop] && row[COL.stop].trim()) {
          latlng = await geocodeStop(row[COL.stop].trim());
        }

        if (!latlng) continue;

        const color = COLORS[type];
        const marker = L.circleMarker(latlng, {
          radius: 9,
          fillColor: color,
          color: '#fff',
          weight: 1.5,
          fillOpacity: 0.88,
        });

        // Popup
        const crowdRow  = row[COL.crowding] ? `<div class="popup-row"><span class="lbl">Crowding: </span>${row[COL.crowding]}</div>` : '';
        const delayRow  = row[COL.delay]    ? `<div class="popup-row"><span class="lbl">Delay: </span>${row[COL.delay]} min</div>` : '';
        const descRow   = row[COL.desc]     ? `<div class="popup-row"><span class="lbl">Details: </span>${row[COL.desc]}</div>` : '';
        const timeStr   = row[COL.time] || row[COL.timestamp] || '';

        marker.bindPopup(`
          <div class="popup-type" style="color:${color}">${TYPE_ICONS[type] || ''} ${type}</div>
          <div class="popup-row"><span class="lbl">Route: </span>${row[COL.route] || '—'}</div>
          <div class="popup-row"><span class="lbl">Stop: </span>${row[COL.stop] || '—'}</div>
          ${crowdRow}${delayRow}${descRow}
          <div class="popup-row" style="margin-top:5px;color:#64748b;font-size:0.75rem">${timeStr}</div>
        `);

        reportLayers[type].addLayer(marker);
      }

      updateStats();
      applyFilter(activeFilter);
      hideLoading();
      setRefreshState('live');
    },
    error: () => {
      setRefreshState('live');
      hideLoading();
    }
  });
}

// ── Stats display ─────────────────────────────
function updateStats() {
  document.getElementById('stat-total').textContent = counts.total;
  document.getElementById('stat-crowd').textContent = counts['Overcrowding'];
  document.getElementById('stat-delay').textContent = counts['Delay'];
  document.getElementById('stat-misc').textContent  = counts['Misconduct'];
  document.getElementById('stat-lost').textContent  = counts['Lost Item'];
}

// ── Filter by type (from stat card click) ─────
function filterByType(type) {
  activeFilter = type;
  applyFilter(type);

  // Update card active states
  document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active'));
  document.querySelector(`.stat-card[data-type="${type}"]`).classList.add('active');
}

function applyFilter(type) {
  // Show/hide marker layers
  Object.keys(reportLayers).forEach(t => {
    if (type === 'all' || type === t) {
      if (!map.hasLayer(reportLayers[t])) map.addLayer(reportLayers[t]);
    } else {
      if (map.hasLayer(reportLayers[t])) map.removeLayer(reportLayers[t]);
    }
  });

  // Filter banner
  const banner = document.getElementById('filter-banner');
  if (type === 'all') {
    banner.classList.remove('visible');
  } else {
    banner.classList.add('visible');
    document.getElementById('filter-banner-text').textContent =
      `Showing: ${TYPE_ICONS[type]} ${type} (${counts[type] || 0})`;
  }

  // Also respect the layer-visibility checkboxes
  syncCheckboxes();
}

function clearFilter() {
  filterByType('all');
}

// ── Layer toggle checkboxes ───────────────────
function syncCheckboxes() {
  Object.keys(reportLayers).forEach(type => {
    const cb = document.getElementById(`cb-${type.replace(' ', '-')}`);
    if (cb) cb.checked = map.hasLayer(reportLayers[type]);
  });
}

function toggleLayer(type, show) {
  if (show) {
    map.addLayer(reportLayers[type]);
  } else {
    map.removeLayer(reportLayers[type]);
    // If this layer was the active filter, reset to all
    if (activeFilter === type) {
      activeFilter = 'all';
      document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active'));
      document.querySelector('.stat-card[data-type="all"]').classList.add('active');
      document.getElementById('filter-banner').classList.remove('visible');
    }
  }
}

function toggleBusStops(show) {
  if (!busStopsLayer) return;
  if (show) map.addLayer(busStopsLayer);
  else map.removeLayer(busStopsLayer);
}

// ── Legend ────────────────────────────────────
const legend = L.control({ position: 'bottomright' });
legend.onAdd = () => {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `
    <h4>Report Types</h4>
    ${Object.entries(COLORS).map(([t, c]) =>
      `<div class="legend-row"><span class="legend-dot" style="background:${c}"></span>${TYPE_ICONS[t]} ${t}</div>`
    ).join('')}
    <hr style="border:none;border-top:1px solid #1e3a5f;margin:7px 0">
    <div class="legend-row"><span class="legend-dot stop"></span>🚏 Bus Stop</div>
    <div class="legend-row"><span class="legend-dot user"></span>📍 Your Location</div>
  `;
  return div;
};
legend.addTo(map);

// ── Filter panel ──────────────────────────────
const filterCtrl = L.control({ position: 'topright' });
filterCtrl.onAdd = () => {
  const div = L.DomUtil.create('div', 'filter-panel');
  div.innerHTML = `
    <h4>Layers</h4>
    ${Object.keys(reportLayers).map(type => {
      const id = `cb-${type.replace(' ','-')}`;
      return `<label><input type="checkbox" id="${id}" checked onchange="toggleLayer('${type}', this.checked)">${TYPE_ICONS[type]} ${type}</label>`;
    }).join('')}
    <hr class="sep">
    <label><input type="checkbox" checked onchange="toggleBusStops(this.checked)">🚏 Bus Stops</label>
  `;
  L.DomEvent.disableClickPropagation(div);
  return div;
};
filterCtrl.addTo(map);

// ── Refresh countdown ─────────────────────────
const REFRESH_INTERVAL = 60; // seconds
let countdown = REFRESH_INTERVAL;
let refreshTimer;

function startCountdown() {
  clearInterval(refreshTimer);
  countdown = REFRESH_INTERVAL;
  document.getElementById('refresh-countdown').textContent = countdown + 's';

  refreshTimer = setInterval(() => {
    countdown--;
    document.getElementById('refresh-countdown').textContent = countdown + 's';
    if (countdown <= 0) {
      clearInterval(refreshTimer);
      loadReports().then(() => startCountdown());
    }
  }, 1000);
}

function setRefreshState(state) {
  const dot   = document.getElementById('refresh-dot');
  const label = document.getElementById('refresh-label');
  if (state === 'loading') {
    dot.classList.add('loading');
    label.textContent = 'Updating';
  } else {
    dot.classList.remove('loading');
    label.textContent = 'Live';
  }
}

// ── Loading overlay ───────────────────────────
function hideLoading() {
  const el = document.getElementById('loading-overlay');
  el.classList.add('hidden');
  setTimeout(() => el.style.display = 'none', 400);
}

// ── Toast ─────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Report page ───────────────────────────────
function openReportForm() {
    window.open(GOOGLE_FORM_URL, '_blank');
}

// ── Boot ──────────────────────────────────────
loadReports().then(() => startCountdown());
</script>

<!-- Toast -->
<div id="toast"></div>
